<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Think Digital - Events</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header and Navigation (Same as index.html) -->
  <header>
    <h1>Upcoming Events</h1>
    <p>Stay updated with our latest tech events.</p>
  </header>

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="events.html">Events</a></li>
      <li><a href="members.html">Members</a></li>
      <li><a href="workshops.html">Workshops</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="resources.html">Resources</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main>
    <section id="event-list">
      <h2>Upcoming Events</h2>
      <div id="events-container">
        <p>Loading events...</p>
      </div>
    </section>

    <section id="create-event" class="admin-only">
      <h2>Create New Event</h2>
      <form id="event-form">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" required>

        <label for="description">Description:</label>
        <textarea id="description" name="description" required></textarea>

        <label for="date">Date:</label>
        <input type="datetime-local" id="date" name="date" required>

        <label for="attendees">Attendees (comma separated):</label>
        <input type="text" id="attendees" name="attendees">

        <button type="submit">Create Event</button>
      </form>
    </section>
  </main>

  <!-- Footer (Same as index.html) -->
  <footer>
    <p>&copy; 2024 Think Digital | XYZ College</p>
    <div class="social-media">
      <a href="#">Instagram</a>
      <a href="#">Twitter</a>
      <a href="#">LinkedIn</a>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
