<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Think Digital - Blog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header and Navigation (Same as index.html) -->
  <header>
    <h1>Blog & News</h1>
    <p>Stay updated with the latest tech trends and club activities.</p>
  </header>

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="events.html">Events</a></li>
      <li><a href="members.html">Members</a></li>
      <li><a href="workshops.html">Workshops</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="resources.html">Resources</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main>
    <section id="blog-list">
      <h2>Latest Posts</h2>
      <div id="blogs-container">
        <p>Loading blog posts...</p>
      </div>
    </section>

    <section id="create-blog" class="admin-only">
      <h2>Create New Blog Post</h2>
      <form id="blog-form">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" required>

        <label for="content">Content:</label>
        <textarea id="content" name="content" required></textarea>

        <button type="submit">Publish Post</button>
      </form>
    </section>
  </main>

  <!-- Footer (Same as index.html) -->
  <footer>
    <p>&copy; 2024 Think Digital | XYZ College</p>
    <div class="social-media">
      <a href="#">Instagram</a>
      <a href="#">Twitter</a>
      <a href="#">LinkedIn</a>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
